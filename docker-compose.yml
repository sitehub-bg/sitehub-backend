services:
  surrealdb:
    image: surrealdb/surrealdb:v3.1.0
    command: start --user root --pass root --bind 0.0.0.0:8000 surrealkv:/data/sitehub.db
    ports:
      - "8000:8000"
    volumes:
      - surreal_data:/data
    healthcheck:
      test: ["CMD", "surreal", "is-ready", "--endpoint", "http://localhost:8000"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  surreal_data:
