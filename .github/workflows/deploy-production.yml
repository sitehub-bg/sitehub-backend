name: Deploy Production

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Read version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Deploying v$VERSION"

      - name: Create git tag
        run: |
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: registry.fly.io
          username: x
          password: ${{ secrets.FLY_API_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: registry.fly.io/sitehub-backend-production:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: superfly/flyctl-actions/setup-flyctl@v1.4

      - name: Deploy to production
        run: flyctl deploy --image registry.fly.io/sitehub-backend-production:${{ github.sha }} --config deploy/backend-production.toml --app sitehub-backend-production
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
