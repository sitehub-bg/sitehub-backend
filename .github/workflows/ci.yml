name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  # ---------- Format check (no compilation) ----------
  fmt:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - name: Format check
        run: cargo +nightly fmt --all -- --check

  # ---------- Dependency audit (no compilation) ----------
  deny:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/install-action@cargo-deny
      - name: Dependency audit
        run: cargo deny check

  # ---------- Compile workspace (shared cache for downstream jobs) ----------
  build:
    needs: [fmt, deny]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.95
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-build
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@nextest
      - name: Build workspace
        run: cargo build --locked --workspace --all-targets
      - name: Archive test binaries
        run: cargo nextest archive --locked --workspace --archive-file nextest-archive.tar.zst
      - name: Upload nextest archive
        uses: actions/upload-artifact@v7
        with:
          name: nextest-archive
          path: nextest-archive.tar.zst
          retention-days: 1
      - name: Upload server binary
        uses: actions/upload-artifact@v7
        with:
          name: server-binary
          path: target/debug/sitehub
          retention-days: 1

  # ---------- Clippy (warm cache from build) ----------
  clippy:
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.95
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-build
          save-if: false
      - name: Clippy
        run: cargo clippy --locked --workspace --all-targets -- -D warnings

  # ---------- Unit tests (pre-built from build job) ----------
  test-unit:
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/install-action@nextest
      - name: Download nextest archive
        uses: actions/download-artifact@v8
        with:
          name: nextest-archive
      - name: Unit tests
        run: cargo nextest run --archive-file nextest-archive.tar.zst --workspace-remap . -E 'not (package(sitehub-public-api-tests) | package(sitehub-admin-api-tests) | package(sitehub-auth-api-tests))'

  # ---------- API tests (pre-built from build job, live server + SurrealDB) ----------
  test-api:
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        package:
          - sitehub-public-api-tests
          - sitehub-admin-api-tests
          - sitehub-auth-api-tests
    env:
      SURREAL_URL: ws://localhost:8000
      SURREAL_NS: sitehub
      SURREAL_DB: test
      SURREAL_USER: root
      SURREAL_PASS: root
      SITEHUB_CONFIG: config/test.toml
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/install-action@nextest
      - name: Download nextest archive
        uses: actions/download-artifact@v8
        with:
          name: nextest-archive
      - name: Download server binary
        uses: actions/download-artifact@v8
        with:
          name: server-binary
      - name: Make server executable
        run: chmod +x sitehub

      - name: Start SurrealDB
        run: |
          docker run -d --name surrealdb -p 8000:8000 \
            surrealdb/surrealdb:v3.1.0 start \
            --user root --pass root --bind 0.0.0.0:8000 memory
          for i in $(seq 1 30); do
            docker exec surrealdb /surreal is-ready --endpoint http://localhost:8000 2>/dev/null && break
            sleep 1
          done

      - name: Start server
        run: |
          ./sitehub > /tmp/server.log 2>&1 &
          echo $! > /tmp/server.pid

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/api/health 2>/dev/null && exit 0
            if ! kill -0 $(cat /tmp/server.pid) 2>/dev/null; then
              echo "Server process died. Logs:"
              cat /tmp/server.log
              exit 1
            fi
            sleep 1
          done
          echo "Server failed to start within 30 seconds. Logs:"
          cat /tmp/server.log
          exit 1

      - name: API tests (${{ matrix.package }})
        run: cargo nextest run --archive-file nextest-archive.tar.zst --workspace-remap . -E 'package(${{ matrix.package }})'

  # ---------- Build & deploy staging (push to main) ----------
  docker-staging:
    needs: [fmt, deny, clippy, test-unit, test-api]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: registry.fly.io
          username: x
          password: ${{ secrets.FLY_API_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: registry.fly.io/sitehub-backend-staging
          tags: |
            type=raw,value=${{ github.sha }}
            type=ref,event=branch

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    needs: [docker-staging]
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@v1.4

      - name: Deploy to staging
        run: flyctl deploy --image registry.fly.io/sitehub-backend-staging:${{ github.sha }} --config deploy/backend-staging.toml --app sitehub-backend-staging
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # ---------- Promote staging image to production (gated by environment approval) ----------
  deploy-production:
    needs: [deploy-staging]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production # Configure required reviewer in repo settings.
    permissions:
      contents: write # for creating release tag
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@v1.4

      - name: Deploy staging image to production
        run: flyctl deploy --image registry.fly.io/sitehub-backend-staging:${{ github.sha }} --config deploy/backend-production.toml --app sitehub-backend-production
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Tag release (only if Cargo.toml version is not already tagged)
        run: |
          VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          TAG="v${VERSION}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "$TAG already exists, skipping"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "$TAG"
            git push origin "$TAG"
            echo "Tagged $TAG"
          fi

