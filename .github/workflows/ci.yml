name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  # ---------- Format check (fast, no compilation) ----------
  fmt:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - name: Format check
        run: cargo +nightly fmt --all -- --check

  # ---------- Dependency audit (no compilation) ----------
  deny:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@cargo-deny
      - name: Dependency audit
        run: cargo deny check

  # ---------- Clippy (needs compilation) ----------
  clippy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-build
      - name: Clippy
        run: cargo clippy --locked --workspace --all-targets -- -D warnings

  # ---------- Unit tests ----------
  test-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-build
      - uses: taiki-e/install-action@nextest
      - name: Unit tests
        run: cargo nextest run --locked --workspace

  # ---------- Integration tests with SurrealDB ----------
  test-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SURREAL_URL: ws://localhost:8000
      SURREAL_NS: sitehub_test
      SURREAL_DB: test
      SURREAL_USER: root
      SURREAL_PASS: root
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-build
      - uses: taiki-e/install-action@nextest

      - name: Start SurrealDB
        run: |
          docker run -d --name surrealdb -p 8000:8000 \
            surrealdb/surrealdb:v3 start \
            --user root --pass root --bind 0.0.0.0:8000 memory
          for i in $(seq 1 30); do
            docker exec surrealdb /surreal is-ready --endpoint http://localhost:8000 2>/dev/null && break
            sleep 1
          done

      - name: Integration tests
        run: cargo nextest run --locked --workspace --run-ignored ignored-only

  # ---------- Build & push Docker image (main + tags only) ----------
  docker:
    needs: [fmt, deny, clippy, test-unit, test-integration]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: registry.fly.io
          username: x
          password: ${{ secrets.FLY_API_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            registry.fly.io/sitehub-backend-staging
            registry.fly.io/sitehub-backend-production
          tags: |
            type=raw,value=${{ github.sha }}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------- Deploy to staging (push to main) ----------
  deploy-staging:
    needs: [docker]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-action/setup-flyctl@v2

      - name: Deploy to staging
        run: flyctl deploy --image registry.fly.io/sitehub-backend-staging:${{ github.sha }} --config deploy/backend-staging.toml --app sitehub-backend-staging
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # ---------- Deploy to production (tagged release v*) ----------
  deploy-production:
    needs: [docker]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-action/setup-flyctl@v2

      - name: Deploy to production
        run: flyctl deploy --image registry.fly.io/sitehub-backend-production:${{ github.sha }} --config deploy/backend-production.toml --app sitehub-backend-production
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
