[graph]
targets = []
all-features = false
no-default-features = false

[output]
feature-depth = 1

[advisories]
version = 2
ignore = [
    # bincode 1.x is unmaintained — transitive dep from surrealdb, not ours to fix
    "RUSTSEC-2025-0141",
    # rsa timing sidechannel — transitive dep from surrealdb, not ours to fix
    "RUSTSEC-2023-0071",
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "Unlicense",
    "Zlib",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[[licenses.exceptions]]
allow = ["BUSL-1.1"]
crate = "surrealdb"

[[licenses.exceptions]]
allow = ["BUSL-1.1"]
crate = "surrealdb-core"

[[licenses.exceptions]]
allow = ["BUSL-1.1"]
crate = "surrealdb-protocol"

[[licenses.exceptions]]
allow = ["BUSL-1.1"]
crate = "surrealdb-types"

[[licenses.exceptions]]
allow = ["BUSL-1.1"]
crate = "surrealdb-types-derive"

[[licenses.exceptions]]
allow = ["BUSL-1.1"]
crate = "sitehub-app"

[[licenses.exceptions]]
allow = ["BUSL-1.1"]
crate = "sitehub-storage"

[[licenses.exceptions]]
allow = ["BUSL-1.1"]
crate = "sitehub-tokens"

[[licenses.exceptions]]
allow = ["BUSL-1.1"]
crate = "sitehub-public-api"

[[licenses.exceptions]]
allow = ["BUSL-1.1"]
crate = "sitehub-admin-api"

[[licenses.exceptions]]
allow = ["BUSL-1.1"]
crate = "sitehub-auth-api"

[[licenses.exceptions]]
allow = ["BUSL-1.1"]
crate = "sitehub-bin"

[[licenses.exceptions]]
allow = ["BUSL-1.1"]
crate = "sitehub-public-api-tests"

[[licenses.exceptions]]
allow = ["BUSL-1.1"]
crate = "sitehub-admin-api-tests"

[[licenses.exceptions]]
allow = ["BUSL-1.1"]
crate = "sitehub-auth-api-tests"

[[licenses.clarify]]
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "allow"
deny = [
    { crate = "dotenv", reason = "Use dotenvy (maintained fork) instead" },
    { crate = "openssl", reason = "Use rustls — no C dependency, no system OpenSSL version drift" },
    { crate = "openssl-sys", reason = "Use rustls — no C dependency" },
]

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
