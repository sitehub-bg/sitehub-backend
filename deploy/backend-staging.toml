app = "sitehub-backend-staging"
primary_region = "ams"
kill_signal = "SIGTERM"
# Must be >= app shutdown_timeout (request_timeout_secs + shutdown_grace_secs
# in config/staging.toml) + 10s margin. Keep in sync manually.
kill_timeout = "25s"

[env]
  SITEHUB_CONFIG = "config/staging.toml"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  max_machines_running = 1

[vm]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[checks]
  [checks.health]
    type = "http"
    port = 3000
    path = "/api/health"
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
